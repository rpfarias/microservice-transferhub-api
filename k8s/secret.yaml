# Credenciais dos bancos e do broker.
#
# HONESTIDADE TECNICA: Secret do Kubernetes e apenas base64 (encoding, NAO
# criptografia). A protecao real vem de RBAC + encryption-at-rest no etcd.
# Em producao, o correto seria External Secrets Operator / Vault / SOPS —
# este manifest com credenciais em texto so e aceitavel em ambiente LOCAL
# (kind/minikube), que e o escopo declarado deste projeto.
apiVersion: v1
kind: Secret
metadata:
  name: transferhub-secrets
  labels:
    app.kubernetes.io/part-of: transferhub
type: Opaque
stringData:  # stringData: o proprio k8s converte para base64 ao aplicar
  TRANSFER_DB_USERNAME: transfer
  TRANSFER_DB_PASSWORD: transfer
  SETTLEMENT_DB_USERNAME: settlement
  SETTLEMENT_DB_PASSWORD: settlement
  RABBITMQ_USERNAME: guest
  RABBITMQ_PASSWORD: guest
