spring.application.name=transfer-api
server.port=8080

# --- Datasource (env-driven; defaults para dev local) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/transferhub_transfer}
spring.datasource.username=${DB_USERNAME:transfer}
spring.datasource.password=${DB_PASSWORD:transfer}

# --- JPA / Hibernate ---
# validate: o Hibernate NUNCA cria/altera tabela. Ele apenas confere se as entidades
# batem com o schema. Quem manda no schema é o Flyway. Se divergir, a app nem sobe.
spring.jpa.hibernate.ddl-auto=validate
# Desliga o Open Session In View (anti-padrao): a sessao do Hibernate nao fica
# aberta durante a renderizacao da resposta. Forca carregar tudo dentro da transacao.
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true

# --- RabbitMQ (env-driven; defaults para dev local) ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# --- Resiliencia dos consumers (settled/failed): retry in-memory + DLQ ---
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1s
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=10s
# Esgotado o retry, rejeita SEM requeue -> DLX -> DLQ (evita loop infinito).
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# --- Actuator / Kubernetes probes ---
management.endpoints.web.exposure.include=health,info
# Cria /actuator/health/liveness e /actuator/health/readiness.
management.endpoint.health.probes.enabled=true
# LIVENESS nunca inclui dependencia externa: reiniciar o pod nao conserta o banco.
# READINESS inclui db e rabbit: sem eles, melhor sair do balanceador (sem restart).
management.endpoint.health.group.readiness.include=readinessState,db,rabbit
