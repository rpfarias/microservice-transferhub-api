# CI do monorepo: verifica os dois modulos em paralelo (matrix) e, apenas em
# push na main, publica as imagens no GHCR com tags latest + SHA do commit.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Um push novo na mesma branch cancela o run anterior (nao desperdica runner).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # mvn verify roda TUDO, incluindo os testes de integracao: o runner
  # ubuntu-latest tem Docker, entao Testcontainers sobe Postgres e RabbitMQ
  # reais dentro do CI. PR nao mergeia com o sistema quebrado.
  # --------------------------------------------------------------------------
  verify:
    name: Verify (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false           # falha em um modulo nao esconde o resultado do outro
      matrix:
        module: [transfer-api, settlement-worker]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven           # cache do ~/.m2 entre runs

      - name: mvn verify
        working-directory: ${{ matrix.module }}
        run: mvn -B verify

  # --------------------------------------------------------------------------
  # Publicacao SO em push na main: PR testa, main publica. A imagem e artefato
  # de release, nao de experimento. Tags: latest (conveniencia) + SHA
  # (rastreabilidade e rollback preciso — nunca faca deploy por latest).
  # --------------------------------------------------------------------------
  build-and-push:
    name: Build & push (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write            # escopo minimo para o GITHUB_TOKEN publicar no GHCR
    strategy:
      matrix:
        module: [transfer-api, settlement-worker]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # token efemero do proprio workflow

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.module }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.module }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.module }}:${{ github.sha }}
          # Cache de camadas Docker entre runs (BuildKit -> GitHub Actions cache).
          cache-from: type=gha,scope=${{ matrix.module }}
          cache-to: type=gha,scope=${{ matrix.module }},mode=max
