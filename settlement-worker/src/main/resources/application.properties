spring.application.name=settlement-worker
server.port=8081

# --- Datasource PRÓPRIO do worker (banco separado do transfer-api) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/transferhub_settlement}
spring.datasource.username=${DB_USERNAME:settlement}
spring.datasource.password=${DB_PASSWORD:settlement}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true

# --- RabbitMQ (env-driven; defaults para dev local) ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# --- Resiliencia do consumer: retry in-memory + DLQ ---
# Retry SO para excecao tecnica (transiente). Excecao de negocio nem chega aqui:
# o listener a captura e converte em rejeicao imediata (TransferFailed).
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1s
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=10s
# Esgotado o retry, a mensagem e rejeitada SEM requeue -> vai para a DLX/DLQ.
# (true seria loop infinito: a mensagem voltaria para a fila eternamente.)
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# --- Actuator / Kubernetes probes ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
# Liveness sem dependencias externas; readiness com db e rabbit (ver transfer-api).
management.endpoint.health.group.readiness.include=readinessState,db,rabbit
